name: Auto-Import Deals

# Triple-redundant scheduling for reliability:
#   1. Supabase pg_cron   (every 15 min — database-level, most reliable)
#   2. cron-job.org       (every 15 min — external, free)
#   3. GitHub Actions     (every 15 min — this file, backup)
# The concurrency guard in /api/auto-import prevents overlapping runs.

on:
  schedule:
    # Every 15 minutes — GitHub cron can delay by 5-15 min but still fires
    - cron: "*/15 * * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI
  repository_dispatch: # Allow external trigger
    types: [auto-import]

permissions:
  contents: read

# Prevent overlapping runs — if a previous run is still going, skip this one
concurrency:
  group: auto-import-${{ github.ref }}
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger auto-import
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          SITE_URL: ${{ vars.SITE_URL || 'https://www.dealpilot.org' }}
        run: |
          MAX_RETRIES=3
          RETRY_DELAY=5
          ATTEMPT=1

          while [ $ATTEMPT -le $MAX_RETRIES ]; do
            echo "🔄 Attempt $ATTEMPT of $MAX_RETRIES..."

            HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
              --max-time 300 \
              -X POST \
              -H "Authorization: Bearer $ADMIN_TOKEN" \
              -H "Content-Type: application/json" \
              "$SITE_URL/api/auto-import")

            echo "HTTP Status: $HTTP_CODE"

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "✅ Success!"
              cat /tmp/response.json | jq '.' 2>/dev/null || cat /tmp/response.json
              exit 0
            fi

            echo "❌ Failed with HTTP $HTTP_CODE"
            cat /tmp/response.json | jq '.' 2>/dev/null || cat /tmp/response.json

            if [ $ATTEMPT -lt $MAX_RETRIES ]; then
              echo "⏳ Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
              RETRY_DELAY=$((RETRY_DELAY * 2))
            fi

            ATTEMPT=$((ATTEMPT + 1))
          done

          echo "💥 All $MAX_RETRIES attempts failed"
          exit 1
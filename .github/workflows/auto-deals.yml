name: Auto-Import Deals (Backup)

# ┌──────────────────────────────────────────────────────────────────┐
# ⚠️  PRIMARY cron is now Vercel Cron (vercel.json) every 15 min.  │
#     This GitHub Actions workflow is a BACKUP that runs hourly.    │
#     It also fires on manual dispatch for ad-hoc triggers.         │
# └──────────────────────────────────────────────────────────────────┘

on:
  schedule:
    # Backup: every hour at :10 (offset from Vercel's :00/:15/.:30/:45)
    - cron: "10 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [auto-import]

permissions:
  contents: read

concurrency:
  group: auto-import-${{ github.ref }}
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger auto-import
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          SITE_URL: ${{ vars.SITE_URL || 'https://www.dealpilot.org' }}
        run: |
          MAX_RETRIES=3
          RETRY_DELAY=5
          ATTEMPT=1

          while [ $ATTEMPT -le $MAX_RETRIES ]; do
            echo "🔄 Attempt $ATTEMPT of $MAX_RETRIES..."

            HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
              --max-time 90 \
              -X POST \
              -H "Authorization: Bearer $ADMIN_TOKEN" \
              -H "Content-Type: application/json" \
              "$SITE_URL/api/auto-import")

            echo "HTTP Status: $HTTP_CODE"

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "✅ Success!"
              cat /tmp/response.json | jq '.' 2>/dev/null || cat /tmp/response.json
              exit 0
            fi

            echo "❌ Failed with HTTP $HTTP_CODE"
            cat /tmp/response.json | jq '.' 2>/dev/null || cat /tmp/response.json

            if [ $ATTEMPT -lt $MAX_RETRIES ]; then
              echo "⏳ Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
              RETRY_DELAY=$((RETRY_DELAY * 2))
            fi

            ATTEMPT=$((ATTEMPT + 1))
          done

          echo "💥 All $MAX_RETRIES attempts failed"
          exit 1